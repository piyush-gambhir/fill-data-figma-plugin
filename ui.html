<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Data Plugin</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 16px;
      color: #333;
    }

    h2 {
      margin-top: 0;
      font-size: 16px;
    }

    .section {
      margin-bottom: 24px;
    }

    button {
      background-color: #18A0FB;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
      margin-right: 8px;
    }

    button:hover {
      background-color: #0D8EE3;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .image-section {
      margin-top: 24px;
    }

    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .status {
      margin-top: 16px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .success {
      background-color: #E3F8EC;
      color: #1B8555;
    }

    .error {
      background-color: #FFE8E8;
      color: #D62828;
    }
  </style>
</head>

<body>
  <div class="section">
    <h2>Insert Vehicle Data</h2>
    <div class="grid">
      <button id="insert-vin">VIN</button>
      <button id="insert-year">Year</button>
      <button id="insert-make">Make</button>
      <button id="insert-model">Model</button>
      <button id="insert-trim">Trim</button>
      <button id="insert-price">Price</button>
      <button id="insert-body-type">Body Type</button>
      <button id="insert-engine">Engine</button>
      <button id="insert-transmission">Transmission</button>
      <button id="insert-fuel-type">Fuel Type</button>
      <button id="insert-mileage">Mileage</button>
      <button id="insert-exterior-color">Exterior Color</button>
      <button id="insert-interior-color">Interior Color</button>
      <button id="insert-drivetrain">Drivetrain</button>
      <button id="insert-features">Features</button>
      <button id="insert-fullname">Full Name</button>
      <button id="insert-full-specs">Full Specs</button>
    </div>
  </div>

  <div class="section image-section">
    <h2>Insert Vehicle Images</h2>

    <div>
      <label for="category">Image Category</label>
      <select id="category">
        <option value="exterior">Exterior</option>
        <option value="interior">Interior</option>
      </select>

      <label for="processing">Processing Type</label>
      <select id="processing">
        <option value="processed">Processed</option>
      </select>

      <label for="ratio">Aspect Ratio</label>
      <select id="ratio">
        <option value="16:9">16:9</option>
        <option value="4:3">4:3</option>
      </select>

      <label for="angle">Angle</label>
      <select id="angle">
        <option value="front">Front</option>
      </select>

      <button id="insert-image">Insert Vehicle Image</button>
    </div>

    <div id="status-container"></div>
  </div>

  <script>
    // Initialize message passing with Figma
    onmessage = (event) => {
      const msg = event.data.pluginMessage;

      if (!msg || typeof msg.type !== 'string') {
        console.warn('Received malformed message:', msg);
        return;
      }

      handlePluginMessage(msg);
    };

    // Add event listeners to data buttons
    document.querySelectorAll('.grid button').forEach(button => {
      button.addEventListener('click', () => {
        const fieldId = button.id.replace('insert-', '');
        const field = fieldId.replace(/-/g, '_');

        parent.postMessage({
          pluginMessage: {
            type: 'INSERT_FIELD',
            payload: { field }
          }
        }, '*');
      });
    });

    // Add event listener to image button
    document.getElementById('insert-image').addEventListener('click', () => {
      const category = document.getElementById('category').value;
      const processing = document.getElementById('processing').value;
      const ratio = document.getElementById('ratio').value;
      const angle = document.getElementById('angle').value;

      parent.postMessage({
        pluginMessage: {
          type: 'INSERT_IMAGE',
          payload: { category, processing, ratio, angle }
        }
      }, '*');

      showStatus('Inserting image...', 'info');
    });

    // Handle messages from the plugin
    function handlePluginMessage(message) {
      console.log('Processing message:', message.type);

      switch (message.type) {
        case 'FETCH_IMAGE':
          // Always use the Image element method as it converts WebP to PNG
          fetchImageWithCanvas(message.url);
          break;

        case 'IMAGE_INSERTED':
          showStatus('Image inserted successfully!', 'success');
          break;

        case 'IMAGE_ERROR':
          showStatus(`Error: ${message.error || 'Unknown error'}`, 'error');
          break;
      }
    }

    // This is the only image fetching method we'll use - it handles format conversion
    function fetchImageWithCanvas(url) {
      showStatus('Fetching image...', 'info');
      console.log('Loading image from:', url);

      try {
        // Create new image element to load the image
        const img = new Image();
        img.crossOrigin = 'anonymous';

        img.onload = function () {
          try {
            console.log('Image loaded successfully', `Size: ${img.width}x${img.height}`);

            // Draw the image to a canvas to convert format
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            // Export as PNG (supported by Figma)
            const dataUrl = canvas.toDataURL('image/png');
            console.log('Converted image to PNG format');

            // Convert data URL to binary
            const binaryString = atob(dataUrl.split(',')[1]);
            const uint8Array = new Uint8Array(binaryString.length);

            for (let i = 0; i < binaryString.length; i++) {
              uint8Array[i] = binaryString.charCodeAt(i);
            }

            console.log('Sending PNG image data to plugin', `Size: ${uint8Array.length} bytes`);

            // Send image data back to plugin
            parent.postMessage({
              pluginMessage: {
                type: 'IMAGE_DATA',
                data: Array.from(uint8Array)
              }
            }, '*');

          } catch (error) {
            console.error('Error processing loaded image:', error);
            parent.postMessage({
              pluginMessage: {
                type: 'IMAGE_ERROR',
                error: error.message || 'Error processing image'
              }
            }, '*');
            showStatus(`Error: ${error.message || 'Error processing image'}`, 'error');
          }
        };

        img.onerror = function (err) {
          console.error('Image load error:', err);
          parent.postMessage({
            pluginMessage: {
              type: 'IMAGE_ERROR',
              error: 'Failed to load image'
            }
          }, '*');
          showStatus('Error: Failed to load image', 'error');
        };

        // Add cache busting to avoid CORS issues
        const cacheBustUrl = `${url}?cb=${Date.now()}`;
        img.src = cacheBustUrl;

      } catch (error) {
        console.error('Error setting up image load:', error);
        parent.postMessage({
          pluginMessage: {
            type: 'IMAGE_ERROR',
            error: error.message || 'Failed to set up image request'
          }
        }, '*');
        showStatus(`Error: ${error.message || 'Failed to set up image request'}`, 'error');
      }
    }

    // Helper to show status messages
    function showStatus(message, type) {
      console.log(`Status: ${message}`);

      const statusContainer = document.getElementById('status-container');
      const statusDiv = document.createElement('div');
      statusDiv.className = `status ${type === 'success' ? 'success' : type === 'error' ? 'error' : ''}`;
      statusDiv.textContent = message;

      // Clear previous messages
      statusContainer.innerHTML = '';
      statusContainer.appendChild(statusDiv);

      // Auto-clear success messages after 5 seconds
      if (type === 'success') {
        setTimeout(() => {
          statusDiv.remove();
        }, 5000);
      }
    }
  </script>
</body>

</html>
